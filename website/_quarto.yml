project:
  type: website
  output-dir: _site

website:
  title: "d-morrison/gha"
  description: >-
    Central, reusable GitHub Actions for d-morrison / UCD-SERG / ucdavis
    R-package and Quarto repositories.
  site-url: "https://d-morrison.github.io/gha/"
  repo-url: "https://github.com/d-morrison/gha"
  repo-subdir: website
  repo-actions: [issue, edit]
  page-navigation: true
  navbar:
    left:
      - text: "Overview"
        href: index.qmd
      - text: "Workflows"
        href: workflows.qmd
      - text: "Permissions"
        href: permissions.qmd
      - text: "Versioning"
        href: versioning.qmd
    right:
      - icon: github
        href: "https://github.com/d-morrison/gha"
        aria-label: "GitHub repository"
  sidebar:
    style: floating
    contents:
      - index.qmd
      - workflows.qmd
      - permissions.qmd
      - versioning.qmd
      - section: "Reference"
        contents:
          - reference/check-bibliography-dois.qmd
          - reference/check-non-standard-chars.qmd
          - reference/check-phi.qmd
          - reference/check-links.qmd
          - reference/check-news.qmd
          - reference/summary.qmd
          - reference/quarto-publish.qmd
          - reference/preview.qmd
          - reference/preview-deploy.qmd
          - reference/cleanup-pr-previews.qmd
          - reference/claude.qmd
          - reference/claude-code-review.qmd
          - reference/bump-submodule.qmd
          - reference/sync-shared-fragments.qmd

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
