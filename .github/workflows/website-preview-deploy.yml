# Deploy half of the PR-preview family for this repo's documentation site.
# Triggered when the build workflow finishes; downloads its artifact and
# publishes the preview to gh-pages in the base-repo context. Kept separate
# from the read-only build half -- that split is the trust boundary.
#
# NOTE: the `workflows:` value below MUST match the `name:` of the build
# workflow (website-preview.yml). `workflow_run` triggers only fire when this
# file lives on the default branch.
name: Website Preview Deploy

on:
  workflow_run:
    workflows: ["Website Preview Build"]
    types: [completed]

jobs:
  deploy:
    permissions:
      contents: write
      pull-requests: write
      actions: read
    uses: d-morrison/gha/.github/workflows/preview-deploy.yml@v2
