name: Bump submodule (reusable)

# Update a named git submodule to its upstream HEAD and open a PR when the
# pointer moves. One direction of the shared-content sync: a consumer that
# vendors another repo as a submodule (e.g. the lab manual's `.ai-config`) stays
# current automatically. The caller stub (examples/bump-submodule.yml) owns the
# schedule / workflow_dispatch triggers.

on:
  workflow_call:
    inputs:
      submodule-path:
        description: Path of the submodule to bump (e.g. .ai-config).
        type: string
        required: true
      remote-branch:
        description: >-
          Upstream branch to track. Empty follows the submodule's configured
          branch (or, failing that, its remote default branch).
        type: string
        default: ''
      base-branch:
        description: Base branch to open the PR against.
        type: string
        default: main
      pr-branch:
        description: Head branch for the automation PR.
        type: string
        default: automated/bump-submodule
    secrets:
      SUBMODULES_TOKEN:
        required: false
      WORKFLOW_TOKEN:
        required: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Persist a push-capable token so open-sync-pr can push without putting
          # the token in the remote URL.
          token: ${{ secrets.WORKFLOW_TOKEN || github.token }}

      - name: Initialize submodules
        uses: d-morrison/gha/.github/actions/checkout-submodules@v2
        with:
          submodules-token: ${{ secrets.SUBMODULES_TOKEN }}

      - name: Bump submodule to upstream HEAD
        id: bump
        env:
          SUBMODULE_PATH: ${{ inputs.submodule-path }}
          REMOTE_BRANCH: ${{ inputs.remote-branch }}
        run: |
          set -euo pipefail
          old=$(git -C "$SUBMODULE_PATH" rev-parse HEAD)
          if [ -n "$REMOTE_BRANCH" ]; then
            git -C "$SUBMODULE_PATH" fetch --depth 1 origin "$REMOTE_BRANCH"
            git -C "$SUBMODULE_PATH" checkout --detach FETCH_HEAD
          else
            git submodule update --remote --depth 1 "$SUBMODULE_PATH"
          fi
          new=$(git -C "$SUBMODULE_PATH" rev-parse HEAD)
          echo "old=${old}" >> "$GITHUB_OUTPUT"
          echo "new=${new}" >> "$GITHUB_OUTPUT"
          if [ "$old" = "$new" ]; then
            echo "::notice::Submodule ${SUBMODULE_PATH} already at ${new}; no bump needed."
          fi

      - name: Open PR if the pointer moved
        uses: d-morrison/gha/open-sync-pr@v2
        with:
          branch: ${{ inputs.pr-branch }}
          base: ${{ inputs.base-branch }}
          paths: ${{ inputs.submodule-path }}
          commit-message: "chore: bump ${{ inputs.submodule-path }} to upstream HEAD"
          pr-body: |
            Automated submodule bump of `${{ inputs.submodule-path }}`.

            - From: `${{ steps.bump.outputs.old }}`
            - To: `${{ steps.bump.outputs.new }}`

            Generated by the `bump-submodule` reusable workflow in
            [`d-morrison/gha`](https://github.com/d-morrison/gha).
          token: ${{ secrets.WORKFLOW_TOKEN || github.token }}
