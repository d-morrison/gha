name: Quarto Publish (reusable)

# Render a Quarto project and deploy it to the gh-pages branch, which GitHub
# Pages serves. Wraps the `quarto-publish` composite (setup + render) and adds
# a gh-pages deploy that preserves the PR-preview subtree. Consumers target this
# workflow with a small caller stub (see examples/quarto-publish.yml) pinned to
# @v1.
#
# One-time consumer setup: repo Settings -> Pages -> Source =
# "Deploy from a branch", branch `gh-pages` / `(root)`.

on:
  workflow_call:
    inputs:
      path:
        description: Path (in the caller repo) to the Quarto project to render (the dir with _quarto.yml).
        type: string
        default: '.'
      setup-r:
        description: Install R and project R dependencies before rendering (for R/knitr Quarto projects).
        type: boolean
        default: false
      r-packages:
        description: r-lib/actions package specs installed when setup-r is true and use-renv is false.
        type: string
        default: |
          any::knitr
          any::rmarkdown
      use-renv:
        description: Restore R dependencies with renv instead of r-packages (requires setup-r).
        type: boolean
        default: false
      tinytex:
        description: Install TinyTeX (needed to render PDF outputs).
        type: boolean
        default: false
      apt-packages:
        description: Extra apt packages to install before rendering (space-separated).
        type: string
        default: ''
      output-dir:
        description: Directory the rendered site is written to (relative to `path`), forwarded to `quarto render --output-dir` (overrides any `_quarto.yml` setting). Defaults to `_site`.
        type: string
        default: '_site'
      checkout-submodules:
        description: Initialize the caller's git submodules before rendering.
        type: boolean
        default: false
      pre-render-artifact:
        description: >-
          Name of a workflow-run artifact to download into the project before
          rendering — lets an earlier job inject build-time assets (e.g.
          recorded media) the site references. Empty to skip.
        type: string
        default: ''
      pre-render-artifact-path:
        description: >-
          Directory (in the caller repo) to extract pre-render-artifact into.
          Defaults to the workspace root when omitted; set it when the artifact
          should land in a subdirectory the site references.
        type: string
        default: ''
      deploy:
        description: Deploy the rendered site to the gh-pages branch. Set false to render only (e.g. a build check); the caller still grants contents:write, since the deploy job is part of the workflow.
        type: boolean
        default: true
    secrets:
      SUBMODULES_TOKEN:
        description: Token with read access to private submodules (only needed when checkout-submodules is true).
        required: false

jobs:
  # Render the site and stage it as an artifact. Held to contents:read so the
  # render step never has write access — even though the caller grants
  # contents:write (a reusable workflow's caller must grant write because the
  # deploy job below declares it, even when deploy is false). Only the deploy
  # job actually uses the write token.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout submodules
        if: inputs.checkout-submodules
        uses: d-morrison/gha/.github/actions/checkout-submodules@v2
        with:
          submodules-token: ${{ secrets.SUBMODULES_TOKEN }}

      - name: Download pre-render artifact
        # Best-effort: a caller's optional asset-builder job may have failed or
        # produced nothing; the site still renders (with fallbacks) without it.
        if: inputs.pre-render-artifact != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.pre-render-artifact }}
          path: ${{ inputs.pre-render-artifact-path }}

      - name: Render site
        # Pinned @v1 per repo convention; the released tag moves to the
        # render-only composite when this branch-deploy change ships as v2. The
        # current @v1 composite also renders into output-dir (it just uploads a
        # now-unused Pages artifact afterward), so the staged site below is the
        # same either way.
        uses: d-morrison/gha/quarto-publish@v2
        with:
          path: ${{ inputs.path }}
          setup-r: ${{ inputs.setup-r }}
          r-packages: ${{ inputs.r-packages }}
          use-renv: ${{ inputs.use-renv }}
          tinytex: ${{ inputs.tinytex }}
          apt-packages: ${{ inputs.apt-packages }}
          output-dir: ${{ inputs.output-dir }}

      - name: Stage rendered site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quarto-publish-site
          path: ${{ inputs.path }}/${{ inputs.output-dir }}
          retention-days: 1

  # Push the staged site to gh-pages. Only this job needs contents:write, and
  # it is skipped entirely when deploy is false.
  deploy:
    needs: build
    if: inputs.deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # JamesIves pushes to gh-pages from a git working copy, so check out first.
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download staged site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: quarto-publish-site
          path: _quarto_publish_site

      - name: Disable Jekyll on the served site
        # Branch-served Pages runs the rendered output through Jekyll, which
        # drops files and folders whose names start with `_` (Quarto emits
        # `_`-prefixed assets). A `.nojekyll` at the gh-pages root turns Jekyll
        # off for the whole site, previews included. `quarto publish gh-pages`
        # adds this automatically; we deploy with JamesIves, so add it here.
        shell: bash
        run: touch _quarto_publish_site/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: _quarto_publish_site
          branch: gh-pages
          # Preserve the PR-preview subtree: the preview family writes per-PR
          # sites under pr-preview/, and a main-site deploy must not wipe them.
          # `pr-preview/` is the umbrella dir pr-preview-action documents for
          # this "deploy both to gh-pages" case.
          clean: true
          clean-exclude: pr-preview/
