name: Check Links (reusable)

on:
  workflow_call:
    inputs:
      lychee-args:
        type: string
        default: 'simple-value'

jobs:
  link-checker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: d-morrison/gha/check-links@v1
