name: Check Bibliography DOIs (reusable)

on:
  workflow_call:
    inputs:
      install-quarto:
        description: Install Quarto when setting up R dependencies.
        type: boolean
        default: false
      no-metadata-check:
        description: Skip CrossRef metadata comparison.
        type: boolean
        default: false
      exclude-keys:
        description: Space/comma-separated BibTeX keys to skip.
        type: string
        default: ''

jobs:
  check-dois:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check bibliography DOIs
        uses: d-morrison/gha/check-bibliography-dois@v1
        with:
          install-quarto: ${{ inputs.install-quarto }}
          no-metadata-check: ${{ inputs.no-metadata-check }}
          exclude-keys: ${{ inputs.exclude-keys }}
