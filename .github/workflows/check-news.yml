name: Check NEWS.md Changelog (reusable)

on:
  workflow_call:
    inputs:
      changelog:
        description: Path to the changelog file to check.
        type: string
        default: 'NEWS.md'

jobs:
  Check-Changelog:
    name: Check Changelog Action
    runs-on: ubuntu-latest
    steps:
      - uses: UCD-SERG/changelog-check-action@47122075af50b17dbf68f7d059c88c99f082ac43 # v2 (major-only tag; no vX.Y.Z published)
        with:
          changelog: ${{ inputs.changelog }}
