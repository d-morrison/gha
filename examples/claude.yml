# Copy to .github/workflows/claude.yml in your repo.
# NOTE: requires the CLAUDE_CODE_OAUTH_TOKEN repository secret. The calling job
# grants write permissions so Claude can push branches and open PRs; `secrets:
# inherit` passes CLAUDE_CODE_OAUTH_TOKEN (and an optional SUBMODULES_TOKEN)
# through to the reusable workflow.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    uses: d-morrison/gha/.github/workflows/claude.yml@v1
    secrets: inherit
    # with:
    #   setup-r: true               # default; set false for non-R repos
    #   install-quarto: true        # for Quarto books
    #   use-renv: true              # restore deps with renv instead of DESCRIPTION
    #   checkout-submodules: true   # needs the SUBMODULES_TOKEN secret
    #   reviewer: d-morrison        # re-requested when Claude pushes to a PR
    #   prompt-addendum: |
